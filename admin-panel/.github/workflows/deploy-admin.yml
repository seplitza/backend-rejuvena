name: Deploy Admin Panel to Production

on:
  push:
    branches:
      - main
    paths:
      - 'Backend-rejuvena/admin-panel/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend-rejuvena/admin-panel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Backend-rejuvena/admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit || true

      - name: Build admin panel
        run: npm run build
        env:
          VITE_API_URL: http://37.252.20.170:9527

      - name: Create deployment archive
        run: |
          cd dist
          tar czf ../admin-panel-${{ github.sha }}.tar.gz *
          ls -lah ../admin-panel-${{ github.sha }}.tar.gz

      - name: Deploy to production server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Create backup on server
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'BACKUP'
          mkdir -p /var/backups/admin-panel
          cd /var/www/rejuvena-admin
          if [ -d "assets" ]; then
            tar czf /var/backups/admin-panel/admin-panel-$(date +%Y%m%d_%H%M%S).tar.gz * .* 2>/dev/null || true
          fi
          BACKUP
          
          # Upload archive
          scp -i ~/.ssh/deploy_key admin-panel-${{ github.sha }}.tar.gz $DEPLOY_USER@$DEPLOY_HOST:/tmp/
          
          # Extract and deploy
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'DEPLOY'
          cd /var/www/rejuvena-admin
          rm -rf * .* 2>/dev/null || true
          tar xzf /tmp/admin-panel-${{ github.sha }}.tar.gz
          rm /tmp/admin-panel-${{ github.sha }}.tar.gz
          
          # Clear CloudFlare cache
          if [ ! -z "$CLOUDFLARE_API_TOKEN" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"files":["https://api-rejuvena.duckdns.org/admin"]}' || true
          fi
          
          echo "✅ Admin panel deployed successfully"
          ls -lah /var/www/rejuvena-admin/
          DEPLOY
          
          # Cleanup
          rm ~/.ssh/deploy_key

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const commit = context.payload.head_commit;
            const message = `✅ Admin Panel Deployment ${status === 'success' ? 'SUCCESS' : 'FAILED'}\n\nCommit: ${commit.message}\nAuthor: ${commit.author.name}`;
            console.log(message);
